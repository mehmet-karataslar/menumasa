name: masamenu
description: "QR Menü Sistemi - İşletmeler için dijital menü çözümü"

publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.8
  flutter_launcher_icons: ^0.14.4
  
  # State Management
  provider: ^6.1.2
  
  # Routing
  go_router: ^16.0.0
  
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^3.5.7
  
  # UI Components
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  
  # Utilities
  url_launcher: ^6.2.5
  share_plus: ^11.0.0
  path_provider: ^2.1.2
  
  # File & Image Picking - Removed file_picker due to compatibility issues
  image_picker: ^1.0.7
  
  # HTTP & Network
  dio: ^5.4.1
  connectivity_plus: ^6.1.4
  
  # Local Storage
  shared_preferences: ^2.2.2
  
  # Animation
  lottie: ^3.1.0
  animations: ^2.0.11
  
  # PDF Generation
  pdf: ^3.10.8
  
  # Loading & Progress
  flutter_spinkit: ^5.2.0
  
  # Date & Time
  table_calendar: ^3.0.9
  
  # Charts & Analytics
  fl_chart: ^1.0.0

  # Firebase Services
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0
  firebase_storage: ^12.3.6
  firebase_messaging: ^15.1.6
  firebase_crashlytics: ^4.1.6
  firebase_analytics: ^11.3.6
  firebase_performance: ^0.10.0+7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/icons/
    - assets/images/
    - assets/animations/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21 # android min sdk min:16, default 21
